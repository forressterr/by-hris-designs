name: E2E (daily)

# Runs the Playwright smoke suite on a schedule so regressions from external
# drift (Vercel/Next/dependency changes, content edits, an expired cert)
# surface even with no push. A random 0–45 min jitter on the first step spreads
# the actual start so it never fires at a fixed instant. `schedule` only fires
# on the default branch (main).
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: e2e-daily
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Randomised start (0–45 min jitter)
        run: sleep $((RANDOM % 2700))

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci
        timeout-minutes: 3

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E (Playwright smoke)
        run: npm run test:e2e
