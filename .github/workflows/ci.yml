name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: 1
  # Public Sanity config so `npm run build` can fetch content (the cutover
  # dropped the data fallback). These NEXT_PUBLIC_* values ship in the client
  # bundle anyway; the `production` dataset is public → tokenless reads.
  NEXT_PUBLIC_SANITY_PROJECT_ID: tjykilgt
  NEXT_PUBLIC_SANITY_DATASET: production
  NEXT_PUBLIC_SANITY_API_VERSION: '2024-10-01'

jobs:
  check:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci
        timeout-minutes: 3

      # The same five gates as `npm run check` (PROTOCOL.md), split for
      # readable failures.
      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Audit (high+)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build
