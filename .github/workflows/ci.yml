name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  check:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci
        timeout-minutes: 3

      # The same five gates as `npm run check` (PROTOCOL.md), split for
      # readable failures.
      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Audit (high+)
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci
        timeout-minutes: 3

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # The Playwright webServer (playwright.config.ts) runs `next build` +
      # `next start`, so there's no separate build step here.
      - name: E2E (Playwright smoke)
        run: npm run test:e2e
