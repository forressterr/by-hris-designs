<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0e0e0e"
    />
    <meta
      name="description"
      content="By_Hris Designs — Multi-Disciplinary Designer based in Eindhoven. Brand, web, and product design work."
    />
    <meta name="robots" content="index, follow" />

    <!-- Social share cards (Open Graph + Twitter). Scrapers don't execute JS,
         so these are static and homepage-oriented (one preview for the whole
         SPA). The per-route <link rel="canonical"> is set client-side in
         src/lib/seo.js so sub-routes aren't flagged as homepage duplicates. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="By_Hris Designs" />
    <meta property="og:url" content="https://www.byhris.cc/" />
    <meta
      property="og:title"
      content="By_Hris Designs — Multi-Disciplinary Designer"
    />
    <meta
      property="og:description"
      content="Brand, web, and product design work by Hristian Goretsov — a multi-disciplinary designer based in Eindhoven, NL."
    />
    <meta property="og:image" content="https://www.byhris.cc/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="By_Hris Designs — portfolio of Hristian Goretsov, multi-disciplinary designer"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="By_Hris Designs — Multi-Disciplinary Designer"
    />
    <meta
      name="twitter:description"
      content="Brand, web, and product design work by Hristian Goretsov — a multi-disciplinary designer based in Eindhoven, NL."
    />
    <meta name="twitter:image" content="https://www.byhris.cc/og-image.jpg" />

    <!-- DM Mono (Google Fonts). preconnect saves the DNS + TLS round-trip
         vs. waiting for the stylesheet to discover the gstatic origin.
         crossorigin is required on the gstatic preconnect because the
         font file itself is fetched with CORS. display=swap keeps text
         visible while the font loads instead of an invisible flash. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Both DM Mono and DM Sans served from one stylesheet request so
         the browser opens a single connection to gstatic for the font
         files. Weights enumerate the exact ones referenced in CSS:
         DM Sans 400 (body, links), 500 (buttons, inline-link),
         600 (h1–h4, stats, form heads), 700 (brand-hero title),
         800 (the bold "n" in "Designs"). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700;800&display=swap"
    />

    <title>By_Hris Designs — Multi-Disciplinary Designer</title>

    <!-- Theme bootstrap. Runs synchronously BEFORE the first paint so the
         correct data-theme is on <html> by the time CSS resolves — no
         flash of light/dark. Stored mode is 'light' | 'dark' | 'system';
         system mode is resolved against prefers-color-scheme. The React
         ThemeProvider takes over afterwards and keeps everything in sync. -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('theme-mode') || 'system';
          if (mode !== 'light' && mode !== 'dark' && mode !== 'system') {
            mode = 'system';
          }
          var prefersDark =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var effective =
            mode === 'system' ? (prefersDark ? 'dark' : 'light') : mode;
          var root = document.documentElement;
          root.setAttribute('data-theme', effective);
          root.setAttribute('data-theme-mode', mode);
        } catch (_e) {
          // Storage blocked (private mode etc.) — default to light.
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.setAttribute('data-theme-mode', 'system');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
